{% set name = "methscope-cli" %}
{% set version = "0.1.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  # In-repo recipe: build the checked-out tree, which already contains the
  # pinned YAME submodule. (GitHub's auto-generated tag tarballs do NOT contain
  # submodules, which is why we do not fetch a url here.) A release build =
  # check out the vX.Y.Z tag, `git submodule update --init`, then conda build.
  path: ..

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - make
  host:
    - libxgboost
    - zlib
  run:
    # libxgboost's and zlib's run_exports pin the runtime automatically;
    # listed for clarity
    - libxgboost

test:
  commands:
    - methscope --version
    - methscope inspect -h 2>&1 | grep -qi inspect

about:
  home: https://github.com/zhou-lab/methscope-cli
  license: AGPL-3.0-or-later
  license_family: AGPL
  license_file: LICENSE
  summary: Sparse DNA methylome analysis via MRMP encoding (C CLI companion to the MethScope R package)
  description: |
    methscope-cli is a pure-C command-line tool for ultra-fast analysis of
    sparse DNA methylomes via Most Recurrent Methylation Pattern (MRMP)
    encoding. It performs the headline MethScope path, taking a query .cg file
    plus an MRMP reference to a cell-by-pattern feature matrix, then to
    XGBoost cell-type prediction or NNLS deconvolution, with no R runtime.
    YAME is linked statically for .cg/.cm I/O and the summary computation;
    libxgboost is the single external runtime dependency.
  dev_url: https://github.com/zhou-lab/methscope-cli

extra:
  recipe-maintainers:
    - zwdzwd
